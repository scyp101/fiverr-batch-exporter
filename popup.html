<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: "Segoe UI", -apple-system, sans-serif;
      width: 280px; margin: 0; padding: 18px;
      background: #0f1318; color: #e6ebf0;
    }
    .head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .mark {
      width: 32px; height: 32px; border-radius: 8px; flex: none;
      background: linear-gradient(135deg, #1dbf73, #12915a);
      display: flex; align-items: center; justify-content: center;
    }
    .mark svg { width: 17px; height: 17px; }
    h3 { margin: 0; font-size: 14px; font-weight: 650; }
    p { font-size: 12px; color: #8a97a5; margin: 0 0 14px 0; line-height: 1.5; }
    button {
      width: 100%; padding: 10px; background: #1dbf73; color: #08110c;
      border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #24d381; }
    button:focus-visible { outline: 2px solid #1dbf73; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="head">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v10"/><path d="m7 9 5 5 5-5"/><path d="M4 19h16"/>
      </svg>
    </div>
    <h3>Fiverr Batch Exporter</h3>
  </div>
  <p>Back up all conversations and attachments as a few batched ZIP downloads. The exporter runs in its own tab so long exports can't be interrupted by closing this popup.</p>
  <button id="open">Open Export Manager</button>
  <script src="popup.js"></script>
</body>
</html>
